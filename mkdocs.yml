site_name: Infrastructure as Code
site_url: https://jor-donegal.github.io/MSc-HCT26
theme:
  logo: images/DeathStar.jpg
  name: readthedocs
  palette:
    scheme: default
    primary: yellow
    accent: deep purple

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details

